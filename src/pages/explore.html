<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaveTune — Обзор</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" data-sidebar aria-label="Боковое меню"></aside>
    <div class="main-shell">
      <header class="topbar" data-header></header>
      <main class="content" id="mainContent">
        <section class="panel-card explore-hero">
          <div class="section-head">
            <div>
              <h1>Обзор</h1>
              <p class="badge">Исследуйте музыку по жанрам и настроению</p>
            </div>
            <a class="button-secondary" href="/index.html">← На главную</a>
          </div>

          <label class="search-field explore-search" aria-label="Поиск по музыке">
            <i class="fa-solid fa-magnifying-glass search-field__icon"></i>
            <input type="search" placeholder="Поиск по жанрам, артистам и трекам" />
          </label>

          <div class="explore-sections">
            <div class="explore-group">
              <h2>Жанры</h2>
              <div class="chip-row">
                <a class="chip" href="#">Hip-Hop</a>
                <a class="chip" href="#">Rock</a>
                <a class="chip" href="#">Pop</a>
                <a class="chip" href="#">Jazz</a>
                <a class="chip" href="#">Electronic</a>
              </div>
            </div>
            <div class="explore-group">
              <h2>Настроение</h2>
              <div class="chip-row">
                <a class="chip" href="#">Workout</a>
                <a class="chip" href="#">Relax</a>
                <a class="chip" href="#">Party</a>
                <a class="chip" href="#">Focus</a>
                <a class="chip" href="#">Romance</a>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <div class="queue-panel__backdrop" data-queue-backdrop></div>
    <aside class="queue-panel is-open" id="queuePanel" aria-label="Мои плейлисты">
      <div class="queue-panel__header">
        <div>
          <h2 id="queue-title">Мои плейлисты</h2>
          <p class="badge" id="queueHint">Очередь пуста</p>
        </div>
      </div>
      <ul class="queue-list" id="queueList"></ul>
    </aside>
    <button class="queue-panel__toggle" type="button" data-queue-toggle aria-label="Свернуть очередь">
      <i class="fa-solid fa-chevron-right"></i>
    </button>
    <footer class="player-bar" data-player aria-label="Музыкальный плеер"></footer>
  </div>
  <script type="module" src="../scripts/main.js"></script>
</body>
</html>
