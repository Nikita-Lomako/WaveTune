<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaveTune</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./src/styles/main.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" data-sidebar aria-label="Боковое меню"></aside>

      <div class="main-shell">
        <header class="topbar" data-header></header>

        <main class="content" id="mainContent">
          <section class="panel-card" aria-labelledby="recommendations-title">
            <div class="section-head">
              <h2 id="recommendations-title">Рекомендации</h2>
              <span class="badge">cyber mix</span>
            </div>
            <div class="recommendations-grid" id="recommendationsGrid"></div>
          </section>

          <section class="panel-card" aria-labelledby="playlist-title">
            <div class="section-head">
              <div>
                <h2 id="playlist-title">Мои плейлисты</h2>
                <p class="badge" id="playlistModeLabel">Сейчас: Все треки</p>
              </div>
              <button class="button-secondary" type="button" id="favoritesToggle">Показать избранные</button>
            </div>
            <div class="table-wrap">
              <table class="playlist-table">
                <thead>
                  <tr>
                    <th>Название</th>
                    <th>Исполнитель</th>
                    <th>Длительность</th>
                    <th>Любимое</th>
                  </tr>
                </thead>
                <tbody data-playlist-body></tbody>
              </table>
            </div>
          </section>
        </main>
      </div>

      <div class="queue-panel__backdrop" data-queue-backdrop></div>
      <aside class="queue-panel" id="queuePanel" aria-label="Очередь воспроизведения">
        <div class="queue-panel__header">
          <div>
            <h3>Очередь</h3>
            <p class="badge">drag & drop</p>
          </div>
          <button class="icon-button" type="button" data-queue-close aria-label="Свернуть очередь">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <ul class="queue-list" id="queueList"></ul>
      </aside>

      <footer class="player-bar" data-player aria-label="Музыкальный плеер"></footer>
    </div>

    <script type="module" src="./src/scripts/main.js"></script>
  </body>
</html>
